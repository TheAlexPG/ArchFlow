apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "archflow.fullname" . }}-frontend
  labels:
    {{- include "archflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.replicaCount.frontend }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "archflow.name" . }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "archflow.labels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.image.frontend.repository }}:{{ .Values.image.frontend.tag }}"
          imagePullPolicy: {{ .Values.image.frontend.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "archflow.fullname" . }}-frontend
  labels:
    {{- include "archflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.frontend.port }}
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ include "archflow.name" . }}
    app.kubernetes.io/component: frontend
