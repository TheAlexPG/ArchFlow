apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "archflow.fullname" . }}-backend
  labels:
    {{- include "archflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.replicaCount.backend }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "archflow.name" . }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "archflow.labels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: {{ include "archflow.fullname" . }}-config
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "archflow.fullname" . }}-backend
  labels:
    {{- include "archflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.backend.port }}
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ include "archflow.name" . }}
    app.kubernetes.io/component: backend
