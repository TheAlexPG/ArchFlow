apiVersion: v1
kind: Secret
metadata:
  name: {{ include "archflow.fullname" . }}-config
  labels: {{ include "archflow.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.config.jwtSecret | quote }}
  DATABASE_URL: "postgresql+asyncpg://{{ .Values.postgres.auth.username }}:{{ .Values.postgres.auth.password }}@{{ include "archflow.fullname" . }}-postgres:5432/{{ .Values.postgres.auth.database }}"
  DATABASE_URL_SYNC: "postgresql://{{ .Values.postgres.auth.username }}:{{ .Values.postgres.auth.password }}@{{ include "archflow.fullname" . }}-postgres:5432/{{ .Values.postgres.auth.database }}"
  REDIS_URL: "redis://{{ include "archflow.fullname" . }}-redis:6379/0"
  ANTHROPIC_API_KEY: {{ .Values.config.anthropicApiKey | quote }}
  ANTHROPIC_MODEL: {{ .Values.config.anthropicModel | quote }}
  BACKEND_CORS_ORIGINS: {{ .Values.config.corsOrigins | quote }}
