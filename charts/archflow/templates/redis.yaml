{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "archflow.fullname" . }}-redis
  labels:
    {{- include "archflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "archflow.name" . }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "archflow.labels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "archflow.fullname" . }}-redis
  labels:
    {{- include "archflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app.kubernetes.io/name: {{ include "archflow.name" . }}
    app.kubernetes.io/component: redis
{{- end }}
