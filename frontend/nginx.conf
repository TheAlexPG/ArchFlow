server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — unknown paths serve index.html so React Router takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed asset files are immutable; cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the HTML entry — always pull fresh so deploys land instantly.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
